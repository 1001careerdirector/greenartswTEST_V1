<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>달빛책방 | 유아독서 멀티미디어 학습지</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="학습 메뉴">
        <a class="brand" href="#" aria-label="달빛책방 홈">
          <span class="brand-mark" aria-hidden="true">ㄱ</span>
          <span>
            <strong>달빛책방</strong>
            <small>유아독서 학습지</small>
          </span>
        </a>

        <nav class="lesson-nav" aria-label="단계 선택">
          <button class="nav-item active" data-step="story" type="button">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v17H6.5A2.5 2.5 0 0 0 4 22V5.5Z"/><path d="M4 5.5A2.5 2.5 0 0 1 6.5 8H20"/><path d="M8 12h7"/><path d="M8 15h5"/></svg>
            </span>
            이야기
          </button>
          <button class="nav-item" data-step="listen" type="button">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 14v-4a8 8 0 0 1 16 0v4"/><path d="M18 19a3 3 0 0 0 3-3v-2a2 2 0 0 0-2-2h-1v7Z"/><path d="M6 19a3 3 0 0 1-3-3v-2a2 2 0 0 1 2-2h1v7Z"/></svg>
            </span>
            듣기
          </button>
          <button class="nav-item" data-step="letters" type="button">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="m4 19 6.5-14 6.5 14"/><path d="M6.5 14h8"/><path d="M19 8v11"/></svg>
            </span>
            글자
          </button>
          <button class="nav-item" data-step="speak" type="button">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 3a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><path d="M12 18v3"/><path d="M8 21h8"/></svg>
            </span>
            말하기
          </button>
          <button class="nav-item" data-step="worksheet" type="button">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M8 4h8l3 3v13H5V4h3Z"/><path d="M15 4v4h4"/><path d="M8 12h8"/><path d="M8 16h5"/></svg>
            </span>
            학습지
          </button>
        </nav>

        <section class="guardian-panel" aria-label="보호자 요약">
          <div>
            <span class="panel-label">오늘 목표</span>
            <strong>의성어 읽기와 첫소리 인식</strong>
          </div>
          <div class="progress-ring" aria-label="진행률 20%">
            <span id="progressText">20%</span>
          </div>
        </section>
      </aside>

      <main class="lesson-main">
        <header class="topbar">
          <div>
            <p class="eyebrow">3-5세 · 12분 과정</p>
            <h1>달님이 들려주는 숲속 책</h1>
          </div>
          <div class="top-actions" aria-label="학습 도구">
            <button class="icon-button" id="muteButton" type="button" aria-label="소리 켜기 또는 끄기" data-tooltip="소리">
              <svg viewBox="0 0 24 24"><path d="M11 5 6 9H3v6h3l5 4V5Z"/><path d="M16 9.5a4 4 0 0 1 0 5"/><path d="M19 7a8 8 0 0 1 0 10"/></svg>
            </button>
            <button class="icon-button" id="restartButton" type="button" aria-label="학습 다시 시작" data-tooltip="처음부터">
              <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v6h6"/></svg>
            </button>
          </div>
        </header>

        <section class="stage-grid">
          <article class="story-panel">
            <div class="media-frame">
              <img src="assets/story-scene.png" alt="아이와 달님이 함께 책을 읽는 따뜻한 숲속 장면" />
              <button class="play-button" id="playStory" type="button" aria-label="이야기 듣기">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7Z"/></svg>
              </button>
            </div>

            <div class="caption-strip">
              <span class="sound-chip">반짝</span>
              <p id="storyLine">달님이 창가에 앉아 작은 책을 펼쳤어요.</p>
            </div>
          </article>

          <section class="activity-panel" aria-live="polite">
            <div class="activity-header">
              <span class="step-pill" id="stepPill">1단계</span>
              <h2 id="activityTitle">이야기를 보고 장면을 떠올려요</h2>
            </div>

            <div class="activity-body" id="activityBody"></div>

            <div class="feedback" id="feedback" role="status"></div>

            <div class="controls-row">
              <button class="secondary-button" id="prevButton" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
                이전
              </button>
              <button class="primary-button" id="nextButton" type="button">
                다음
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
              </button>
            </div>
          </section>
        </section>

        <section class="dashboard-band" aria-label="학습 기록">
          <article>
            <span class="metric-label">읽은 낱말</span>
            <strong id="wordsMetric">3</strong>
          </article>
          <article>
            <span class="metric-label">정답 스티커</span>
            <strong id="stickersMetric">0</strong>
          </article>
          <article>
            <span class="metric-label">집중 시간</span>
            <strong>08:30</strong>
          </article>
          <article>
            <span class="metric-label">보호자 메모</span>
            <strong>첫소리 ㄷ 연습</strong>
          </article>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
